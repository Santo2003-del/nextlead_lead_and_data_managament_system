server {
    listen 80;
    server_name serantix.com www.serantix.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name serantix.com www.serantix.com;

    # SSL configuration (Path to your SSL certs)
    # ssl_certificate /etc/letsencrypt/live/serantix.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/serantix.com/privkey.pem;
    
    # Improve SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Compress responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API requests -> Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:5055/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings for long-running processes (exports, etc)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Exported files -> Node.js backend static serving
    location /exports/ {
        proxy_pass http://127.0.0.1:5055/exports/;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets -> Frontend build
    location / {
        # Assuming the backend serves the frontend from frontend/build
        proxy_pass http://127.0.0.1:5055/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
